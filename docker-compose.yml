# luban-ai-assistant 本地开发/测试编排（6 容器，无 GPU）
# 容器：fastapi / postgres / milvus / etcd(milvus 依赖) / minio(milvus 内部存储+OSS) / langfuse
#
# 生产部署见 deploy/deploy.sh（SSH 推到测试服务器）。本地：docker compose up -d --wait
# 敏感字段从 .env（本地）或部署脚本 source .env.dev 注入，不入 compose 明文。

services:
  fastapi:
    build: .
    image: luban-ai-assistant:dev
    container_name: luban-ai-fastapi
    env_file:
      - path: .env
        required: false
    environment:
      # 服务发现（容器名）
      POSTGRES_DSN: postgresql://luban:luban@postgres:5432/luban_ai
      MILVUS_HOST: milvus
      MINIO_ENDPOINT: minio:9000
      LANGFUSE_HOST: http://langfuse:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_started
      minio:
        condition: service_started
      langfuse:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: luban-ai-postgres
    environment:
      POSTGRES_USER: luban
      POSTGRES_PASSWORD: luban
      POSTGRES_DB: luban_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luban -d luban_ai"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  # Milvus 元数据存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: luban-ai-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcddata:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Milvus 内部对象存储
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: luban-ai-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: luban-ai-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvusdata:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: luban-ai-langfuse
    environment:
      DATABASE_URL: postgresql://luban:luban@postgres:5432/langfuse
      NEXTAUTH_SECRET: changeme-nextauth-secret
      SALT: changeme-salt
      NEXTAUTH_URL: http://localhost:3000
      # 复用同实例 postgres（独立 schema 由 langfuse 自管）
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
  etcddata:
  miniodata:
  milvusdata:
